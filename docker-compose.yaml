version: '3.8'

services:
  neo4j:
    image: neo4j:latest    # 使用较新的 Neo4j 5.x 版本
    container_name: neo4j-gds
    restart: unless-stopped
    ports:
      - "7474:7474"   # 浏览器访问的 HTTP 端口
      - "7687:7687"   # 数据库连接的 Bolt 端口
    environment:
      - NEO4J_AUTH=neo4j/12345678  # 设置初始账号/密码，请务必修改密码
      - NEO4J_PLUGINS=["graph-data-science"]    # 核心！启动时自动下载并加载 GDS 插件
      # 如果内存比较大，可以解开下面两行的注释来优化性能：
      # - NEO4J_server_memory_pagecache_size=1G 
      # - NEO4J_server_memory_heap_initial__size=1G
      # - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - ./data:/data        # 挂载数据目录（重要：防止容器删除后数据丢失）
      - ./logs:/logs        # 挂载日志目录
      - ./import:/var/lib/neo4j/import # 如果你有CSV文件想导入，可以放这里


      